specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: RFID
providerId: rfid
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - RFID
  - IoT
  - Supply Chain
  - Rate Limiting
description: >-
  RFID is a multi-vendor ecosystem with no unified rate-limit policy. Each underlying API
  (Zebra Data Services, Impinj ItemSense, GS1 EPCIS, ClearStream) publishes its own throttling
  contract behind authenticated developer portals or partner programs.
notes: >-
  No category-level rate limits exist. Reconcile with per-vendor docs. This artifact carries a
  single varies entry as a placeholder.
sources:
  - https://www.zebra.com/us/en/services/data-services.html
  - https://www.impinj.com/products/platform/itemsense
  - https://www.gs1.org/standards/epcis
responseCodes:
  throttled: 429
limits:
  - name: Vendor-specific throttling
    scope: account
    metric: varies
    limit: see vendor documentation
    notes: >-
      Each RFID vendor enforces its own per-key or per-account throttling. No canonical
      cross-vendor numbers exist.
policies:
  - name: Vendor Variance
    description: >-
      Rate-limit semantics, headers, and recovery behavior vary by underlying RFID vendor.
      Implement per-vendor backoff per their documentation.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
