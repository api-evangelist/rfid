specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: RFID
providerId: rfid
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - RFID
  - IoT
  - Supply Chain
  - Inventory Management
  - Asset Tracking
  - GS1
  - EPCIS
description: >-
  RFID is a technology category and ecosystem rather than a single commercial provider.
  Pricing depends on the specific vendor (Zebra Data Services, Impinj ItemSense, ClearStream,
  GS1 EPCIS, etc.) and is not centrally published. Each underlying vendor publishes its own
  commercial terms — typically gated to authenticated developer-portal accounts or negotiated
  through partner/enterprise sales channels.
notes: >-
  No unified commercial offering exists for the RFID category. Per-vendor pricing should be
  reconciled in the corresponding vendor repos (zebra, impinj, gs1, etc.). This artifact retains
  a single contact-sales placeholder for completeness.
sources:
  - https://www.zebra.com/us/en/services/data-services.html
  - https://www.impinj.com/products/platform/itemsense
  - https://www.gs1.org/standards/epcis
plans:
  - id: rfid-contact-sales
    name: Contact Sales
    type: enterprise
    description: >-
      No unified RFID API plan exists. Engage the relevant vendor (Zebra, Impinj, GS1, etc.) for
      product-specific pricing, quotas, and licensing terms.
    entries:
      - label: Vendor-specific pricing
        name: vendor_pricing
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Vendor-Specific Terms
      - name: Partner Onboarding
      - name: Negotiated Quotas
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
