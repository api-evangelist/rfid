description: >-
  RFID is a multi-vendor technology category, not a single billable service. FinOps treatment
  must be applied per underlying vendor. This artifact carries a placeholder shape.
notes: >-
  No unified billing model exists across the RFID ecosystem. Allocate cost per underlying
  vendor invoice (Zebra, Impinj, GS1, ClearStream, etc.).
sources:
  - https://www.zebra.com/us/en/services/data-services.html
  - https://www.impinj.com/products/platform/itemsense
billingModel:
  pricingCategory: Varies by Vendor
  billingFrequency: Varies
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: RFID (multi-vendor)
  ServiceCategory: IoT / RFID
  ProviderName: Multiple Vendors
  PublisherName: Multiple Vendors
  BillingCurrency: USD
meters:
  - name: vendor_charges
    description: Aggregate of vendor-specific RFID service charges
    unit: varies
    aggregation: sum
    dimensions:
      - vendor
      - product
principles:
  - name: Visibility
    description: >-
      Consolidate RFID vendor invoices into a single line of sight per program (Zebra, Impinj,
      GS1, ClearStream).
  - name: Allocation
    description: >-
      Tag RFID hardware and API spend to the originating warehouse, store, or supply-chain lane
      rather than to a generic IT bucket.
  - name: Optimization
    description: >-
      Negotiate volume discounts per vendor; consolidate readers and tag SKUs to reduce
      vendor sprawl.
  - name: Accountability
    description: >-
      Assign supply-chain or operations owners to each RFID vendor relationship; review tag
      and reader unit economics quarterly.
